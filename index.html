<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Roda'sPortfolio</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
        
            background: black;
            margin: 0;
           
            overflow: hidden;
            overscroll-behavior: none;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

    
        .container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            overflow: hidden;
        }

        
        .stage {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('portfolio_background_backup.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 0;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
            display: block;
            z-index: 0;
        }

        .monitor-screen {
            position: absolute;
            left: 22.9%;
            top: 25.5%;
            width: 56.5%;
            height: 41.7%;
            overflow: hidden;
            background: rgb(131, 19, 19);
            background-image: url('portfolio_background_backup.png');
            z-index: 1;
        }     

 @media (max-aspect-ratio: 16/9) {
            
            .monitor-screen {
                top: 27%;
            }
        }

        @media (max-width: 900px) {
           
            .monitor-screen {
                left: 20%;
                top: 26%;
                height: 36vh;
            }
        }

        @media (max-width: 600px) {
            
            .monitor-screen {
                left: 12%;
                top: 28%;
                height: 34vh;
                min-width: 200px;
            }
        }

        @media (max-width: 480px) {
           
            .monitor-screen {
                left: 10%;
                top: 30%;
                height: 28vh;
                min-width: 180px;
            }
        }

        .desktop-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="stage">
            <div class="monitor-screen">
                <img src="portfolio_background.png" class="desktop-image">
            </div>
        </div>
    </div>

</body>
</html>
