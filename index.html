<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Roda's Portfolio</title>
    <link rel="icon" type="image/png" href="favicon_icon.png">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background: black;
            margin: 0;
            overflow: hidden;
            overscroll-behavior: none;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            overflow: hidden;
        }

        .stage {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-image: url('portfolio_background.png');
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 0;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
            display: block;
            z-index: 0;
        }

        .monitor-screen {
            position: absolute;
            left: 22.9%;
            top: 25.5%;
            width: 56.5%;
            height: 40%;
            overflow: hidden;
            z-index: 1;
        }     

         @media (max-aspect-ratio: 16/9) {
            
            .monitor-screen {
                top: 27%;
            }
        }

        @media (max-width: 900px) {
           
            .monitor-screen {
                left: 20%;
                top: 26%;
                height: 36vh;
            }
        }

        @media (max-width: 600px) {
            
            .monitor-screen {
                left: 12%;
                top: 28%;
                height: 34vh;
                min-width: 200px;
            }
        }

        @media (max-width: 480px) {
           
            .monitor-screen {
                left: 10%;
                top: 30%;
                height: 28vh;
                min-width: 180px;
            }
        }

        .desktop-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .dock-button {
            position: absolute;  
            left: 70.7%;
            bottom: 30%;
            width: 3%;
            aspect-ratio: 1 / 1;
            background: transparent;
            border: none;
            padding: 0;
            position: absolute;
            cursor: pointer;
            z-index: 999;
            pointer-events: auto;
        }

        .dock-button::before {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 6px;
            background: rgba(255,255,255,0);
            transition: background-color 150ms ease, box-shadow 150ms ease;
            pointer-events: none;
        }

        .dock-button:hover::before,
        .dock-button:focus::before {
            background: rgba(255,255,255,0.22);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.08) inset;
        }

        .dock-button:focus {
            outline: 2px solid rgba(255,255,255,0.18);
            outline-offset: 2px;
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="stage">
            <div class="monitor-screen">
                
            </div>
        </div>
    </div>

</body>
</html>

<script>
   
    function openDesktopImage() {
        const monitor = document.querySelector('.monitor-screen');
        if (!monitor) return;
        monitor.innerHTML = '';
        const img = document.createElement('img');
        img.src = 'portfolio_desktop.png';
        img.className = 'desktop-image';
        img.alt = 'Portfolio desktop view';
        monitor.appendChild(img);
    }

    document.addEventListener('DOMContentLoaded', () => {
       
        const stage = document.querySelector('.stage');
        if (!stage) return;

        const offsets = ['27.7%', '23.8%', '31.8%'];
        offsets.forEach((leftPos, i) => {
            const b = document.createElement('button');
            b.className = 'dock-button';
            b.style.left = leftPos;
            b.setAttribute('aria-label', `Open desktop in monitor ${i+1}`);
            b.addEventListener('click', openDesktopImage);
            b.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openDesktopImage();
                }
            });

            stage.appendChild(b);
        });
    });
</script>
